name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sh -n scripts/install.sh
      - run: sh -n scripts/package-macos-app.sh
      - run: sh -n scripts/package-linux-tarball.sh
      - run: sh -n scripts/package-debian-deb.sh
      - run: sh -n scripts/generate-checksums.sh
      - run: sh -n scripts/notarize-macos-app.sh
      - run: sh -n scripts/capture-macos-window-proof.sh
      - run: sh -n scripts/prove-macos-app-identity.sh
      - run: sh -n scripts/prove-arch-package.sh
      - run: sh -n scripts/prove-debian-package.sh
      - run: sh -n scripts/prove-linux-release-install.sh
      - run: sh -n scripts/prove-github-release-install.sh
      - run: sh -n scripts/prove-current-host-compatibility.sh
      - run: sh -n scripts/prove-welcome-preview.sh
      - run: bash -n packaging/arch/PKGBUILD
      - run: sh -n packaging/arch/gromaq.install
      - run: cargo fmt --check
      - run: git diff --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all
      - run: cargo run -- --theme-legibility-smoke
      - run: cargo run -- --theme-preview-snapshot target/gromaq-theme-preview-ci.ppm
      - run: scripts/prove-welcome-preview.sh
      - run: |
          printf '%s\n' '[theme]' 'preset = "gromaq-graphite"' 'background_opacity = 0.75' 'cursor_opacity = 0.5' 'selection_opacity = 0.25' > target/gromaq-theme-preview-config-ci.toml
          cargo run -- --theme-preview-config target/gromaq-theme-preview-config-ci.toml target/gromaq-theme-preview-config-ci.ppm
      - run: cargo run -- --runtime-clipboard-paste-smoke
      - run: cargo run -- --runtime-glyph-frame-smoke
      - run: cargo run -- --runtime-glyph-frame-snapshot target/gromaq-runtime-glyph-frame-ci.ppm
      - run: cargo run -- --welcome-image-snapshot target/gromaq-welcome-image-ci.ppm
      - run: cargo run -- --runtime-scrollback-smoke
      - run: cargo run -- --runtime-perf-smoke
      - run: cargo run -- --runtime-perf-budget-smoke
      - run: cargo run -- --runtime-perf-p95-smoke
      - run: cargo run -- --runtime-large-output-smoke
      - run: cargo run -- --runtime-bounded-state-smoke
      - run: cargo run -- --runtime-memory-smoke
      - run: cargo run -- --runtime-continuous-output-smoke
      - run: cargo run -- --runtime-alternate-screen-smoke
      - run: cargo run -- --runtime-reflow-smoke
      - run: cargo run -- --runtime-config-reload-smoke
      - run: cargo run -- --runtime-text-zoom-smoke
      - run: cargo run -- --runtime-repaint-smoke
      - run: cargo run -- --runtime-tool-workflow-smoke
      - run: cargo run -- --runtime-focus-smoke
      - run: cargo run -- --runtime-mouse-smoke
      - run: cargo run -- --runtime-response-smoke
      - run: cargo run -- --runtime-idle-smoke
      - run: cargo run -- --runtime-idle-cpu-smoke
      - run: cargo run -- --runtime-real-shell-smoke
      - run: cargo run -- --runtime-real-shell-command-output-smoke
      - run: cargo run -- --runtime-real-shell-perf-budget-smoke
      - run: cargo run -- --runtime-real-shell-large-output-smoke
      - run: cargo run -- --runtime-real-shell-reflow-smoke
      - run: cargo run -- --frame-scheduler-smoke
      - run: cargo run -- --gpu-smoke
      - run: cargo run -- --gpu-upload-smoke
      - run: cargo run -- --gpu-textured-quad-smoke
      - run: cargo run -- --gpu-terminal-text-smoke
      - run: cargo run -- --gpu-glyph-atlas-smoke
      - run: cargo run -- --gpu-text-atlas-smoke
      - run: cargo bench --bench parser_throughput -- --list

  linux-packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sh -n scripts/install.sh
      - run: sh -n scripts/package-linux-tarball.sh
      - run: sh -n scripts/package-debian-deb.sh
      - run: sh -n scripts/generate-checksums.sh
      - run: bash -n packaging/arch/PKGBUILD
      - run: |
          sudo apt-get update
          sudo apt-get install -y desktop-file-utils
      - run: cargo test --test project_policy
      - run: GROMAQ_SKIP_CARGO_INSTALL=1 GROMAQ_PLATFORM=Linux GROMAQ_ASSET_ROOT="$PWD" GROMAQ_INSTALL_ROOT=target/install-proof sh scripts/install.sh
      - run: scripts/package-linux-tarball.sh
      - run: scripts/package-debian-deb.sh
      - run: sudo dpkg -i target/dist/gromaq_*.deb
      - run: test -x /usr/bin/gromaq
      - run: /usr/bin/gromaq --version
      - run: |
          dpkg -L gromaq
          dpkg -L gromaq | grep -F /usr/bin/gromaq
          dpkg -L gromaq | grep -F /usr/share/doc/gromaq/README.md
          dpkg -L gromaq | grep -F /usr/share/doc/gromaq/copyright
          dpkg -L gromaq | grep -F /usr/share/applications/dev.gromaq.Gromaq.desktop
          dpkg -L gromaq | grep -F /usr/share/metainfo/dev.gromaq.Gromaq.metainfo.xml
          dpkg -L gromaq | grep -F /usr/share/icons/hicolor/256x256/apps/dev.gromaq.Gromaq.png
      - run: GROMAQ_CHECKSUM_EXTRA_FILES="packaging/arch/PKGBUILD packaging/arch/.SRCINFO packaging/arch/gromaq.install" scripts/prove-linux-release-install.sh
      - run: test -x target/release-install-proof/bin/gromaq

  arch-packaging:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - uses: actions/checkout@v5
      - run: pacman -Syu --noconfirm git rust
      - run: bash -n packaging/arch/PKGBUILD
      - run: test -s packaging/arch/.SRCINFO
      - run: test -s packaging/arch/gromaq.install
      - run: useradd -m builder
      - run: chown -R builder:builder "$PWD"
      - run: su builder -c "cd '$PWD/packaging/arch' && makepkg --nobuild --noconfirm"
      - run: su builder -c "cd '$PWD/packaging/arch' && makepkg --noconfirm"
      - run: pacman -U --noconfirm packaging/arch/gromaq-git-*.pkg.tar.*
      - run: test -x /usr/bin/gromaq
      - run: /usr/bin/gromaq --version
      - run: |
          pacman -Ql gromaq-git
          pacman -Ql gromaq-git | grep -F /usr/bin/gromaq
          pacman -Ql gromaq-git | grep -F /usr/share/doc/gromaq/README.md
          pacman -Ql gromaq-git | grep -F /usr/share/licenses/gromaq/LICENSE
          pacman -Ql gromaq-git | grep -F /usr/share/applications/dev.gromaq.Gromaq.desktop
          pacman -Ql gromaq-git | grep -F /usr/share/metainfo/dev.gromaq.Gromaq.metainfo.xml
          pacman -Ql gromaq-git | grep -F /usr/share/icons/hicolor/256x256/apps/dev.gromaq.Gromaq.png
      - run: su builder -c "cd '$PWD/packaging/arch' && makepkg --printsrcinfo"
