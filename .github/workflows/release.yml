name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  linux-tarball:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --test project_policy
      - run: scripts/package-linux-tarball.sh
      - run: scripts/package-debian-deb.sh
      - run: scripts/generate-checksums.sh
      - uses: actions/upload-artifact@v4
        with:
          name: gromaq-linux-tarball
          path: |
            target/dist/*.tar.gz
            target/dist/*.deb
            target/dist/SHA256SUMS

  macos-app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --test project_policy
      - run: scripts/package-macos-app.sh
      - run: ditto -c -k --sequesterRsrc --keepParent target/dist/Gromaq.app target/dist/Gromaq-macos-app.zip
      - run: scripts/generate-checksums.sh
      - uses: actions/upload-artifact@v4
        with:
          name: gromaq-macos-app
          path: |
            target/dist/Gromaq-macos-app.zip
            target/dist/SHA256SUMS
