name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux-tarball:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --test project_policy
      - run: scripts/package-linux-tarball.sh
      - run: scripts/package-debian-deb.sh
      - run: GROMAQ_CHECKSUM_EXTRA_FILES="packaging/arch/PKGBUILD packaging/arch/.SRCINFO packaging/arch/gromaq.install" scripts/generate-checksums.sh
      - name: Publish Linux assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            notes_file=".github/release-notes/${GITHUB_REF_NAME}.md"
            notes_args=(--notes "Gromaq ${GITHUB_REF_NAME} release artifacts.")
            if [ -f "${notes_file}" ]; then
              notes_args=(--notes-file "${notes_file}")
            fi
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              "${notes_args[@]}" \
              --verify-tag || gh release view "${GITHUB_REF_NAME}" >/dev/null
          fi
          cp target/dist/SHA256SUMS target/dist/SHA256SUMS-linux-x86_64
          # GitHub stores hidden .SRCINFO release uploads as default.SRCINFO.
          gh release upload "${GITHUB_REF_NAME}" \
            target/dist/*.tar.gz \
            target/dist/*.deb \
            packaging/arch/PKGBUILD \
            packaging/arch/.SRCINFO \
            packaging/arch/gromaq.install \
            target/dist/SHA256SUMS-linux-x86_64 \
            --clobber
      - uses: actions/upload-artifact@v4
        with:
          name: gromaq-linux-tarball
          include-hidden-files: true
          path: |
            target/dist/*.tar.gz
            target/dist/*.deb
            packaging/arch/PKGBUILD
            packaging/arch/.SRCINFO
            packaging/arch/gromaq.install
            target/dist/SHA256SUMS

  macos-app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --test project_policy
      - run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - run: GROMAQ_MACOS_UNIVERSAL=1 scripts/package-macos-app.sh
      - run: file target/dist/Gromaq.app/Contents/MacOS/gromaq
      - run: lipo -info target/dist/Gromaq.app/Contents/MacOS/gromaq
      - run: codesign --verify --deep --strict --verbose=4 target/dist/Gromaq.app
      - run: codesign -dv --verbose=4 target/dist/Gromaq.app
      - run: ditto -c -k --sequesterRsrc --keepParent target/dist/Gromaq.app target/dist/Gromaq-macos-app.zip
      - run: scripts/generate-checksums.sh
      - name: Publish macOS assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            notes_file=".github/release-notes/${GITHUB_REF_NAME}.md"
            notes_args=(--notes "Gromaq ${GITHUB_REF_NAME} release artifacts.")
            if [ -f "${notes_file}" ]; then
              notes_args=(--notes-file "${notes_file}")
            fi
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              "${notes_args[@]}" \
              --verify-tag || gh release view "${GITHUB_REF_NAME}" >/dev/null
          fi
          cp target/dist/SHA256SUMS target/dist/SHA256SUMS-macos-app
          gh release upload "${GITHUB_REF_NAME}" \
            target/dist/Gromaq-macos-app.zip \
            target/dist/SHA256SUMS-macos-app \
            --clobber
      - uses: actions/upload-artifact@v4
        with:
          name: gromaq-macos-app
          path: |
            target/dist/Gromaq-macos-app.zip
            target/dist/SHA256SUMS
            target/dist/Gromaq-macos-app-summary.txt
            target/dist/Gromaq-macos-codesign.txt
            target/dist/Gromaq-macos-arch.txt
